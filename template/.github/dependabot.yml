version: 2

multi-ecosystem-groups:
  module:
    commit-message:
      prefix: "chore"
      include: scope
    schedule:
      interval: "weekly"
  workflows:
    commit-message:
      prefix: "chore"
      include: scope
    schedule:
      interval: "weekly"

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    multi-ecosystem-group: "workflows"
    patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/"
    multi-ecosystem-group: "module"
    patterns: ["*"]
    cooldown:
      default-days: 14

  - package-ecosystem: "terraform"
    directory: "/"
    multi-ecosystem-group: "module"
    patterns: ["*"]
    cooldown:
      default-days: 14
    ignore:
      - dependency-name: "hashicorp/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "microsoft/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "azure/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "integrations/*"
        update-types: ["version-update:semver-major"]
